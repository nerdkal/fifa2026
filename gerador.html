<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Squad FIFA - Dual Team</title>
<style>
:root{
    --gold:#FFD700;--blue:#045694;--red:#f43056;--text-dark:#03122b;
    /* Tons de azul mais claros */
    --bg-blue-top: #2c7bb6;
    --bg-blue-bottom: #00a8cc;
}
body{margin:0;padding:40px;box-sizing:border-box;font-family:'Arial Black',sans-serif;background:radial-gradient(circle,#0a2e50 0%,#03122b 100%);color:white;min-height:100vh}
.page{display:none}.page.active{display:block}
.conversor-container{max-width:1100px;margin:auto;background:rgba(255,255,255,.08);padding:30px;border-radius:20px}
textarea{width:100%;font-family:monospace;margin-bottom:15px;padding:15px;border:none;border-radius:12px;background:white;color:#333}
#scriptConsole{height:180px}#input1, #input2{height:150px}
button{cursor:pointer;padding:15px 25px;background:var(--red);color:white;border:none;border-radius:10px;font-weight:bold;margin-right:10px}

.btn-gerar-estilizado {
    display: flex; align-items: center; justify-content: center; padding: 15px 40px;
    font-family: 'Poppins', sans-serif; font-size: 1.2rem; font-weight: 900;
    color: white; background: #6225E6; border: none; cursor: pointer;
    transition: 0.5s; box-shadow: 0 0 15px #6225E6; transform: skewX(-15deg);
    margin: 30px auto;
}
.btn-gerar-estilizado:hover { transition: 0.5s; box-shadow: 0 0 30px #6225E6, 0 0 50px #FBC638; }
.btn-gerar-estilizado span { transform: skewX(15deg); display: flex; align-items: center; }

.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:40px;max-width:1200px;margin:0 auto}

.card{
    background:#fff; clip-path:polygon(0% 0%, 100% 0%, 100% 80%, 50% 100%, 0% 80%); 
    border-radius: 25px; padding:10px 10px 50px 20px; display:flex; flex-direction:column; align-items:center;
    text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.5); cursor: pointer; 
    border: 5px solid transparent; 
    transition: all 0.4s ease;
}

@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
.floating{animation:float 3s ease-in-out infinite}

/* Fundo azul claro e Glow focado na imagem */
.image-box { 
    width: 100%; height: 280px; 
    background: linear-gradient(180deg, var(--bg-blue-top) 0%, var(--bg-blue-bottom) 100%); 
    display: flex; align-items: flex-end; justify-content: center; position: relative; 
    margin-bottom: 15px; border-radius: 20px; overflow: hidden; transition: 0.3s; 
}
.card.selected .image-box {
    animation: inner-glow-pulse 1.2s infinite alternate;
}

@keyframes inner-glow-pulse {
    0% { box-shadow: inset 0 0 20px var(--gold); }
    100% { box-shadow: inset 0 0 50px var(--gold), 0 0 20px var(--gold); }
}

.card-photo { max-height: 95%; width: auto; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
.card-flag{width:45px;height:35px;margin-bottom:10px;object-fit:contain}
.name{color:var(--text-dark);font-size:0.95rem;font-weight:800;margin:5px 0;text-transform:uppercase}
.card-divider{width:50px;height:2px;background:#ccc;margin:5px 0}
.position{color:var(--blue);font-size:0.75rem;font-weight:700;text-transform:uppercase;margin-top:2px}

#action-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; }
</style>
</head>
<body>

<div id="page-converter" class="page active">
    <div class="conversor-container">
        <h2>Gerador de Squad</h2>
        <textarea id="scriptConsole">const players = Array.from(document.querySelectorAll('img.image_img__pNjkh')).map(img => { const name = (img.alt || '').trim(); if (!name || name === 'FIFA' || name.includes('GooglePlayStore') || name.includes('AppleAppStore')) return null; if (name === "") return null; const playerSrc = img.currentSrc || img.src; const badgeCard = img.closest('[class*="badgeCard"]'); let flagSrc = ''; if (badgeCard) { const allImgs = Array.from(badgeCard.querySelectorAll('img')); const flagImg = allImgs.find(i => i !== img && (i.className.includes('flag') || i.src.includes('flags'))) || allImgs.find(i => i !== img); flagSrc = flagImg ? (flagImg.currentSrc || flagImg.src) : ''; } let position = badgeCard?.querySelector('[class*="playerPosition"]')?.innerText?.trim(); if (!position && badgeCard) { const text = badgeCard.innerText.toLowerCase(); if (text.includes('manager') || text.includes('head coach') || text.includes('coach')) position = 'MANAGER'; } if (!position) position = 'PLAYER'; return `<div class="player-card"><img src="${playerSrc}" class="player-photo"><img src="${flagSrc}" class="flag-icon"><div class="name">${name}</div><div class="position">${position}</div></div>`; }).filter(Boolean).join('\n'); console.log(players);</textarea>
        <button onclick="copiarScript()">📋 Copiar Script</button>
        <hr>
        <p><strong>HTML Time 1:</strong></p><textarea id="input1"></textarea>
        <p><strong>HTML Time 2:</strong></p><textarea id="input2"></textarea>
        <button onclick="processarTudo()" class="btn-gerar-estilizado"><span>GERAR PACOTE</span></button>
    </div>
</div>

<div id="page-squad" class="page">
    <button onclick="voltar()">← VOLTAR</button>
    <h2>Clique nas cartas para selecionar</h2>
    <div class="squad-grid" id="grid"></div>
    <div id="action-bar">
        <button onclick="abrirSelecao()" style="background:var(--gold); color:black; font-size:1.2rem; padding: 20px 40px; border-radius:15px; border:none; font-weight:bold; box-shadow: 0 0 20px var(--gold);">ABRIR SELEÇÃO</button>
    </div>
</div>

<div id="page-result" class="page">
    <button onclick="voltarParaGrid()">← VOLTAR</button>
    <h2>Cartas Selecionadas</h2>
    <div class="squad-grid" id="grid-result"></div>
</div>

<script>
let squadData = { time1: [], time2: [] };
let selectedPlayers = new Set();

function copiarScript() { navigator.clipboard.writeText(document.getElementById('scriptConsole').value); }
function voltar() { document.getElementById('page-squad').classList.remove('active'); document.getElementById('page-converter').classList.add('active'); }
function voltarParaGrid() { document.getElementById('page-result').classList.remove('active'); document.getElementById('page-squad').classList.add('active'); }

function extrairJogadores(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    return Array.from(doc.querySelectorAll('.player-card')).map(card => ({
        name: card.querySelector('.name')?.innerText.trim().toUpperCase() || '',
        position: card.querySelector('.position')?.innerText.trim().toUpperCase() || '',
        src: card.querySelector('.player-photo')?.src || '',
        flag: card.querySelector('.flag-icon')?.src || ''
    }));
}

function processarTudo() {
    squadData.time1 = extrairJogadores(document.getElementById('input1').value);
    squadData.time2 = extrairJogadores(document.getElementById('input2').value);
    gerarPagina();
}

function montarHTMLCard(p) {
    return `
        ${p.flag ? `<img src="${p.flag}" class="card-flag">` : '<div style="height:35px"></div>'}
        <div class="image-box"><img src="${p.src}" class="card-photo"></div>
        <p class="name">${p.name}</p><div class="card-divider"></div><p class="position">${p.position}</p>
    `;
}

function gerarPagina() {
    document.getElementById('page-converter').classList.remove('active');
    document.getElementById('page-squad').classList.add('active');
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    [...squadData.time1, ...squadData.time2].forEach((p, index) => {
        const div = document.createElement('div');
        div.className = 'card floating';
        div.style.animationDelay = (index * 0.1) + 's';
        div.innerHTML = montarHTMLCard(p);
        div.onclick = () => {
            if(selectedPlayers.has(p)) { selectedPlayers.delete(p); div.classList.remove('selected'); }
            else { selectedPlayers.add(p); div.classList.add('selected'); }
            document.getElementById('action-bar').style.display = selectedPlayers.size > 0 ? 'block' : 'none';
        };
        grid.appendChild(div);
    });
}

function abrirSelecao() {
    document.getElementById('page-squad').classList.remove('active');
    document.getElementById('page-result').classList.add('active');
    const gridResult = document.getElementById('grid-result');
    gridResult.innerHTML = '';
    selectedPlayers.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = montarHTMLCard(p);
        gridResult.appendChild(div);
    });
}
</script>
</body>
</html>
